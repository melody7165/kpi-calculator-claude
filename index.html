<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部門 KPI 計算工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --accent: #5b7fff;
    --accent2: #7c5bff;
    --green: #4ecb94;
    --red: #ff5b72;
    --amber: #ffbe5b;
    --text: #e8eaf0;
    --muted: #8b90a7;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,127,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,127,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header { text-align: center; margin-bottom: 48px; }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(91,127,255,0.3);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    background: linear-gradient(135deg, #ffffff 0%, #8b9cbf 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .subtitle { color: var(--muted); font-size: 14px; font-weight: 300; max-width: 520px; margin: 0 auto; line-height: 1.7; }

  .main { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }

  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 540px) { .upload-grid { grid-template-columns: 1fr; } }

  .upload-card {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .upload-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); }
  .upload-card.has-file { border-style: solid; border-color: var(--green); background: rgba(78,203,148,0.04); }
  .upload-card input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .upload-icon { width: 50px; height: 50px; margin: 0 auto 14px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(91,127,255,0.12); transition: background 0.2s; }
  .upload-card.has-file .upload-icon { background: rgba(78,203,148,0.15); }
  .upload-label { font-size: 10px; font-weight: 500; color: var(--muted); margin-bottom: 5px; letter-spacing: 1.5px; text-transform: uppercase; }
  .upload-supervisor { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .upload-status { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); transition: color 0.2s; word-break: break-all; line-height: 1.5; }
  .upload-card.has-file .upload-status { color: var(--green); }

  .rules-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
  .rules-title { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; }
  .rules-list { display: flex; flex-direction: column; gap: 9px; }
  .rule-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--muted); line-height: 1.6; }
  .rule-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; font-family: 'DM Mono', monospace; flex-shrink: 0; margin-top: 1px; }
  .dot-avg { background: rgba(91,127,255,0.2); color: var(--accent); }
  .dot-sum { background: rgba(78,203,148,0.2); color: var(--green); }
  .dot-txt { background: rgba(255,190,91,0.2); color: var(--amber); }
  .dot-skip { background: rgba(255,91,114,0.15); color: var(--red); }

  .btn { width: 100%; padding: 15px; border-radius: var(--radius); border: none; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 0.5px; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; box-shadow: 0 4px 20px rgba(91,127,255,0.3); }
  .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(91,127,255,0.4); }
  .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; box-shadow: none; transform: none; }
  .btn-download { background: rgba(78,203,148,0.1); color: var(--green); border: 1.5px solid rgba(78,203,148,0.3); }
  .btn-download:hover { background: rgba(78,203,148,0.2); box-shadow: 0 4px 20px rgba(78,203,148,0.2); }

  .result-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: none; }
  .result-panel.visible { display: block; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .result-header { background: linear-gradient(135deg, rgba(78,203,148,0.08), rgba(91,127,255,0.06)); padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
  .result-header-text { font-weight: 600; font-size: 15px; }
  .result-header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .result-body { padding: 22px 24px; }

  .sheet-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
  .sheet-item { background: var(--surface2); border-radius: 9px; padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .sheet-name { font-size: 14px; font-weight: 500; }
  .sheet-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-pill { font-size: 11px; font-family: 'DM Mono', monospace; padding: 3px 10px; border-radius: 20px; }
  .pill-avg { background: rgba(91,127,255,0.15); color: #8fa8ff; }
  .pill-solo { background: rgba(255,190,91,0.15); color: var(--amber); }
  .pill-members { background: rgba(78,203,148,0.1); color: #6ddeb0; }

  .divider { text-align: center; position: relative; color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1px; margin: 0 0 14px; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .tab-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab-btn { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .tab-btn:hover { border-color: rgba(91,127,255,0.5); color: var(--text); }
  .tab-btn.active { background: rgba(91,127,255,0.15); border-color: var(--accent); color: var(--accent); }

  .preview-wrap { overflow-x: auto; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); }
  .preview-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: 'DM Mono', monospace; }
  .preview-table th { background: var(--surface2); color: var(--accent); padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 0.5px; white-space: nowrap; }
  .preview-table td { padding: 7px 12px; text-align: center; border-bottom: 1px solid rgba(42,45,58,0.5); color: var(--muted); }
  .preview-table tr:last-child td { border-bottom: none; }
  .preview-table tr:hover td { background: rgba(255,255,255,0.02); }
  .td-name { text-align: left !important; color: var(--text) !important; font-weight: 500; }
  .td-score { color: var(--green) !important; font-weight: 600; }
  .td-note { text-align: left !important; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }

  .log-area { background: #09090d; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); max-height: 260px; overflow-y: auto; line-height: 1.9; white-space: pre; margin-bottom: 16px; }
  .log-ok { color: var(--green); }
  .log-warn { color: var(--amber); }
  .log-info { color: #8fa8ff; }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #2a1a1e; border: 1px solid rgba(255,91,114,0.4); color: var(--red); padding: 12px 20px; border-radius: var(--radius); font-size: 13px; transition: transform 0.3s; z-index: 999; max-width: 90vw; text-align: center; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="badge">KPI 計算工具</div>
  <h1>部門績效評量整合系統</h1>
  <p class="subtitle">上傳兩位組長的評量 Excel，系統自動計算整合並保留原始格式、樣式與公式</p>
</header>

<div class="main">

  <div class="upload-grid">
    <div class="upload-card" id="card1">
      <input type="file" id="file1" accept=".xlsx,.xls">
      <div class="upload-icon">📊</div>
      <div class="upload-label">組長 A</div>
      <div class="upload-supervisor">第一位組長評量檔</div>
      <div class="upload-status" id="status1">點擊或拖曳上傳 .xlsx</div>
    </div>
    <div class="upload-card" id="card2">
      <input type="file" id="file2" accept=".xlsx,.xls">
      <div class="upload-icon">📋</div>
      <div class="upload-label">組長 B</div>
      <div class="upload-supervisor">第二位組長評量檔</div>
      <div class="upload-status" id="status2">點擊或拖曳上傳 .xlsx</div>
    </div>
  </div>

  <div class="rules-card">
    <div class="rules-title">計算規則說明</div>
    <div class="rules-list">
      <div class="rule-item">
        <div class="rule-dot dot-avg">1–4</div>
        <span>評量指標 1–4 項：兩位組長皆有評分者取<strong style="color:#8fa8ff">平均值</strong>；僅一位有評分者直接採用該分數</span>
      </div>
      <div class="rule-item">
        <div class="rule-dot dot-sum">5–6</div>
        <span>加分項 / 扣分項：採<strong style="color:var(--green)">累計</strong>方式，兩位組長分數相加，不取平均</span>
      </div>
      <div class="rule-item">
        <div class="rule-dot dot-txt">文</div>
        <span>加扣分事蹟說明：兩位組長的文字說明<strong style="color:var(--amber)">合併帶入</strong>最終表格</span>
      </div>
      <div class="rule-item">
        <div class="rule-dot dot-skip">跳</div>
        <span>人員 1–6 項分數全為 0，視為該組長<strong style="color:var(--red)">本月未評分</strong>，不納入計算</span>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" id="processBtn" disabled>
    <span id="btnSpinner"></span>
    <span id="btnText">請先上傳兩個評量檔案</span>
  </button>

  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <div style="font-size:26px">✅</div>
      <div>
        <div class="result-header-text">整合計算完成</div>
        <div class="result-header-sub" id="resultSub"></div>
      </div>
    </div>
    <div class="result-body">
      <div class="sheet-list" id="sheetList"></div>
      <div class="divider">整合結果預覽</div>
      <div class="tab-bar" id="tabBar"></div>
      <div class="preview-wrap">
        <table class="preview-table" id="previewTable"></table>
      </div>
      <div class="divider">計算日誌</div>
      <div class="log-area" id="logArea"></div>
      <button class="btn btn-download" id="downloadBtn">⬇ 下載最終 KPI 結果 Excel（保留原始格式）</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);

// Store raw ArrayBuffers so we can re-read with full options
let buf1 = null, buf2 = null;
let wb1 = null, wb2 = null;
let mergedResults = {};   // sheetName -> { memberCols, totalRowIdx, notesRowIdx }
let outputWb = null;
let outputFilename = '';

// ── UI helpers ────────────────────────────────────────
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

function log(msg, type = 'info') {
  const la = $('logArea');
  const span = document.createElement('span');
  span.className = 'log-' + type;
  span.textContent = msg + '\n';
  la.appendChild(span);
  la.scrollTop = la.scrollHeight;
}

// ── File reading ──────────────────────────────────────
function readFileAsBuffer(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);  // ArrayBuffer
    reader.onerror = rej;
    reader.readAsArrayBuffer(file);
  });
}

function bufToWb(buf) {
  // cellStyles: true  → preserve fill / font / border / numFmt
  // cellFormula: true → preserve formulas (f property)
  // sheetStubs: true  → preserve empty cells so merges render correctly
  return XLSX.read(new Uint8Array(buf), {
    type: 'array',
    cellStyles: true,
    cellFormula: true,
    sheetStubs: true,
  });
}

async function handleFile(inputEl, cardEl, statusEl, slot) {
  const file = inputEl.files[0];
  if (!file) return;
  try {
    const buf = await readFileAsBuffer(file);
    const wb  = bufToWb(buf);
    if (slot === 1) { buf1 = buf; wb1 = wb; }
    else            { buf2 = buf; wb2 = wb; }
    cardEl.classList.add('has-file');
    statusEl.textContent = '✓ ' + file.name;
    updateBtn();
  } catch(e) { showToast('讀取失敗：' + e.message); }
}

$('file1').addEventListener('change', () => handleFile($('file1'), $('card1'), $('status1'), 1));
$('file2').addEventListener('change', () => handleFile($('file2'), $('card2'), $('status2'), 2));

function updateBtn() {
  const ready = wb1 && wb2;
  $('processBtn').disabled = !ready;
  $('btnText').textContent = ready
    ? '開始計算整合分數'
    : (wb1 || wb2) ? '請再上傳另一個評量檔案' : '請先上傳兩個評量檔案';
}

// ── Worksheet helpers ─────────────────────────────────

// Deep-clone a worksheet object, preserving styles, merges, col/row dims, etc.
function cloneWs(ws) {
  const out = {};
  for (const k of Object.keys(ws)) {
    if (k === '!ref') {
      out[k] = ws[k];
    } else if (k.startsWith('!')) {
      // Arrays / objects: deep clone via JSON (safe for xlsx metadata)
      try { out[k] = JSON.parse(JSON.stringify(ws[k])); }
      catch(_) { out[k] = ws[k]; }
    } else {
      // Cell object: shallow clone keeps style ref, which is fine
      out[k] = Object.assign({}, ws[k]);
    }
  }
  return out;
}

// Read a worksheet into a plain 2D array (values only, for analysis)
function wsToAOA(ws) {
  if (!ws || !ws['!ref']) return [];
  const range = XLSX.utils.decode_range(ws['!ref']);
  const rows = [];
  for (let r = range.s.r; r <= range.e.r; r++) {
    const row = [];
    for (let c = range.s.c; c <= range.e.c; c++) {
      const cell = ws[XLSX.utils.encode_cell({ r, c })];
      row.push(cell ? cell.v : null);
    }
    rows.push(row);
  }
  return rows;
}

// Get cell value from a worksheet at (rowIdx, colIdx) — 0-based
function getCellVal(ws, ri, ci) {
  const cell = ws[XLSX.utils.encode_cell({ r: ri, c: ci })];
  return cell ? cell.v : null;
}

// Set cell value in a worksheet, preserving existing style / formula slot
function setCellVal(ws, ri, ci, val) {
  const addr = XLSX.utils.encode_cell({ r: ri, c: ci });
  const existing = ws[addr];
  if (existing) {
    existing.v = val;
    existing.t = typeof val === 'number' ? 'n' : 's';
    // Remove cached formula result vs formula: keep formula text but update v
    // Actually: keep .f so Excel recalculates on open; just set .v as hint
    if (val === null || val === undefined) {
      existing.v = null;
      existing.t = 'z';
    }
  } else {
    // Cell didn't exist — create minimal cell
    ws[addr] = { v: val, t: typeof val === 'number' ? 'n' : 's' };
  }
}

// Row-type detectors on AOA rows
const isScore14 = r => { const d = r[3]; return typeof d === 'number' && d > 0; };
const isScore56 = r => { const c = r[2]; return typeof c === 'string' && (c.includes('+X%') || c.includes('-X%')); };
const isNotesRow = r => { const c = r[2]; return typeof c === 'string' && c.includes('加扣分事蹟'); };
const isTotalRow = r => { const c = r[2]; return typeof c === 'string' && c.includes('總計'); };

function getMemberCols(rows) {
  const hdr = rows[1] || [];
  return hdr.reduce((acc, v, i) => {
    if (i >= 4 && v && typeof v === 'string' && v.trim())
      acc.push({ idx: i, name: v.trim() });
    return acc;
  }, []);
}

function supervisorScored(rows, ci) {
  return rows.some(r => r && (isScore14(r) || isScore56(r)) &&
                         typeof r[ci] === 'number' && r[ci] !== 0);
}

function combineText(a, b) {
  const ta = (a != null && String(a).trim()) ? String(a).trim() : '';
  const tb = (b != null && String(b).trim()) ? String(b).trim() : '';
  if (ta && tb) return ta + '\n-----------\n' + tb;
  return ta || tb || null;
}

function r4(n) { return Math.round(n * 10000) / 10000; }

// ── Core merge logic ──────────────────────────────────
// Takes two workbook worksheets (ws1 = base/template, ws2 = second supervisor).
// Returns a *cloned* ws1 with merged values written in-place.
function mergeWorksheets(ws1, ws2, sName) {
  const wsOut = cloneWs(ws1);
  const rows1 = wsToAOA(ws1);
  const rows2 = ws2 ? wsToAOA(ws2) : null;

  const memberCols = getMemberCols(rows1);
  const stats = { avg: 0, solo1: 0, solo2: 0 };

  if (!memberCols.length) {
    log(`  ⚠ ${sName}: 找不到成員欄位，略過`, 'warn');
    return { wsOut, memberCols, stats, rows1 };
  }

  for (const { idx, name } of memberCols) {
    const s1 = supervisorScored(rows1, idx);
    const s2 = rows2 ? supervisorScored(rows2, idx) : false;

    if (!s1 && !s2) { log(`  ⬜ ${name}: 兩位組長均未評分，略過`, 'warn'); continue; }

    if      (s1 && s2) { stats.avg++;   log(`  ⚡ ${name}: 兩位均評分 → 1–4 平均 / 5–6 累計`, 'ok'); }
    else if (s1)       { stats.solo1++; log(`  📌 ${name}: 僅組長A有評分 → 直接採用`, 'info'); }
    else               { stats.solo2++; log(`  📌 ${name}: 僅組長B有評分 → 直接採用`, 'info'); }

    let runningTotal = 0;
    let hasTotalRow = false;

    for (let ri = 0; ri < rows1.length; ri++) {
      const row1 = rows1[ri];
      if (!row1) continue;
      const row2v = (rows2 && rows2[ri]) ? rows2[ri] : null;

      if (isScore14(row1)) {
        const v1 = typeof row1[idx] === 'number' ? row1[idx] : 0;
        const v2 = row2v && typeof row2v[idx] === 'number' ? row2v[idx] : 0;
        let val;
        if (s1 && s2)  val = r4((v1 + v2) / 2);
        else if (s1)   val = v1;
        else           val = v2;
        setCellVal(wsOut, ri, idx, val);
        runningTotal += val;

      } else if (isScore56(row1)) {
        const v1 = typeof row1[idx] === 'number' ? row1[idx] : 0;
        const v2 = row2v && typeof row2v[idx] === 'number' ? row2v[idx] : 0;
        const sum = r4(v1 + v2);
        setCellVal(wsOut, ri, idx, sum);
        runningTotal += sum;

      } else if (isNotesRow(row1)) {
        const merged = combineText(row1[idx], row2v ? row2v[idx] : null);
        setCellVal(wsOut, ri, idx, merged);

      } else if (isTotalRow(row1)) {
        hasTotalRow = true;
        // Update the cached value of the SUM formula so it shows correct number on open
        // Keep .f (formula) so user can still edit/recalculate manually
        const addr = XLSX.utils.encode_cell({ r: ri, c: idx });
        if (wsOut[addr]) {
          wsOut[addr].v = r4(runningTotal);
          wsOut[addr].t = 'n';
          // Don't delete .f — preserve the formula for manual re-editing
        } else {
          wsOut[addr] = { v: r4(runningTotal), t: 'n' };
        }
      }
    }
  }

  return { wsOut, memberCols, stats, rows1 };
}

// ── Main process ──────────────────────────────────────
$('processBtn').addEventListener('click', async () => {
  if (!wb1 || !wb2) return;

  $('logArea').innerHTML = '';
  $('sheetList').innerHTML = '';
  $('tabBar').innerHTML = '';
  $('previewTable').innerHTML = '';
  $('resultPanel').classList.remove('visible');
  mergedResults = {};
  outputWb = null;

  $('processBtn').disabled = true;
  $('btnSpinner').innerHTML = '<div class="spinner"></div>';
  $('btnText').textContent = '計算中...';
  await new Promise(r => setTimeout(r, 50));

  try {
    const sheets1 = wb1.SheetNames;
    const sheets2 = wb2.SheetNames;

    log(`[組長A] 工作表: ${sheets1.join(', ')}`, 'info');
    log(`[組長B] 工作表: ${sheets2.join(', ')}`, 'info');

    // Start output workbook as a fresh copy of wb1 (preserves workbook-level props)
    outputWb = XLSX.utils.book_new();
    // Copy workbook properties if available
    if (wb1.Props)     outputWb.Props = wb1.Props;
    if (wb1.Custprops) outputWb.Custprops = wb1.Custprops;

    for (const sName of sheets1) {
      log(`\n📄 工作表：【${sName}】`, 'info');

      const ws1 = wb1.Sheets[sName];
      const ws2 = (sheets2.includes(sName)) ? wb2.Sheets[sName] : null;

      let wsOut, memberCols, stats, rows1;

      if (ws2) {
        log(`  ✔ 兩個檔案均有此工作表 → 進行整合`, 'ok');
        const result = mergeWorksheets(ws1, ws2, sName);
        wsOut = result.wsOut;
        memberCols = result.memberCols;
        stats = result.stats;
        rows1 = result.rows1;
      } else {
        log(`  ℹ 組長B無此工作表 → 直接採用組長A資料`, 'info');
        wsOut = cloneWs(ws1);
        rows1 = wsToAOA(ws1);
        memberCols = getMemberCols(rows1);
        stats = null;
      }

      XLSX.utils.book_append_sheet(outputWb, wsOut, sName);

      // Store for preview
      mergedResults[sName] = { wsOut, memberCols, rows1 };

      // Summary card
      const card = document.createElement('div');
      card.className = 'sheet-item';
      card.innerHTML = `
        <span class="sheet-name">📄 ${sName}</span>
        <div class="sheet-stats">
          <span class="stat-pill pill-members">👥 ${memberCols.length} 位成員</span>
          ${stats ? [
            stats.avg   > 0 ? `<span class="stat-pill pill-avg">⚡ 平均 ${stats.avg} 人</span>` : '',
            (stats.solo1+stats.solo2) > 0 ? `<span class="stat-pill pill-solo">📌 單獨採用 ${stats.solo1+stats.solo2} 人</span>` : ''
          ].join('') : '<span class="stat-pill pill-solo">📌 僅組長A</span>'}
        </div>`;
      $('sheetList').appendChild(card);
    }

    // Build tabs + preview
    sheets1.forEach((sName, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.textContent = sName;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPreview(sName);
      });
      $('tabBar').appendChild(btn);
    });
    renderPreview(sheets1[0]);

    const now = new Date();
    const ds = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    outputFilename = `KPI整合結果_${ds}.xlsx`;
    $('resultSub').textContent = `共整合 ${sheets1.length} 個工作表 · 保留原始格式與公式 · ${ds}`;

    log(`\n✅ 所有工作表整合完成，原始格式、樣式與公式均已保留！`, 'ok');
    $('resultPanel').classList.add('visible');

  } catch(e) {
    showToast('計算失敗：' + e.message);
    log('❌ ' + e.message, 'warn');
    console.error(e);
  }

  $('processBtn').disabled = false;
  $('btnSpinner').innerHTML = '';
  updateBtn();
  $('btnText').textContent = '重新計算';
});

// ── Preview table ──────────────────────────────────────
function renderPreview(sName) {
  const data = mergedResults[sName];
  if (!data) return;
  const { wsOut, memberCols, rows1 } = data;

  const totalRowIdx  = rows1.findIndex(r => r && isTotalRow(r));
  const notesRowIdx  = rows1.findIndex(r => r && isNotesRow(r));

  const tbl = $('previewTable');
  tbl.innerHTML = '';

  const thead = tbl.createTHead();
  const hrow  = thead.insertRow();
  ['成員姓名', '1–6項 KPI 總計', '加扣分事蹟摘要'].forEach(txt => {
    const th = document.createElement('th');
    th.textContent = txt;
    hrow.appendChild(th);
  });

  const tbody = tbl.createTBody();
  for (const { idx, name } of memberCols) {
    const tr = tbody.insertRow();

    const tdName = tr.insertCell();
    tdName.className = 'td-name';
    tdName.textContent = name;

    const tdScore = tr.insertCell();
    const tv = (totalRowIdx >= 0) ? getCellVal(wsOut, totalRowIdx, idx) : null;
    if (typeof tv === 'number' && tv > 0) {
      tdScore.textContent = (tv * 100).toFixed(2) + '%';
      tdScore.className = 'td-score';
    } else {
      tdScore.textContent = '—';
      tdScore.style.color = 'var(--muted)';
    }

    const tdNote = tr.insertCell();
    const nv = (notesRowIdx >= 0) ? getCellVal(wsOut, notesRowIdx, idx) : null;
    tdNote.className = 'td-note';
    tdNote.textContent = nv ? String(nv).replace(/\n-----------\n/g, '  ｜  ') : '—';
    tdNote.title = nv ? String(nv) : '';
  }
}

function getCellVal(ws, ri, ci) {
  const cell = ws[XLSX.utils.encode_cell({ r: ri, c: ci })];
  return cell ? cell.v : null;
}

// ── Download ──────────────────────────────────────────
$('downloadBtn').addEventListener('click', () => {
  if (!outputWb) return;
  const buf = XLSX.write(outputWb, {
    bookType: 'xlsx',
    type: 'array',
    cellStyles: true,   // write styles back out
  });
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), { href: url, download: outputFilename }).click();
  URL.revokeObjectURL(url);
});
</script>
